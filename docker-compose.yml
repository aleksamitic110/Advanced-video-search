services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: yt-video-search-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-videosearch}
      POSTGRES_USER: ${POSTGRES_USER:-videosearch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-videosearch}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-videosearch} -d ${POSTGRES_DB:-videosearch}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: yt-video-search-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-videosearch}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-videosearch}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-videosearch}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      APP_DATA_DIR: /app/data
      FRAME_INTERVAL_SECONDS: ${FRAME_INTERVAL_SECONDS:-8}
      EMBEDDING_SERVICE_URL: http://embedding-service:8081
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - backend-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  client:
    build:
      context: ./client
    container_name: yt-video-search-client
    ports:
      - "${CLIENT_PORT:-5173}:80"
    depends_on:
      - backend
    restart: unless-stopped

  extension:
    build:
      context: ./extension
    container_name: yt-video-search-extension-static
    ports:
      - "${EXTENSION_STATIC_PORT:-5174}:80"
    restart: unless-stopped

volumes:
  backend-data:
  postgres-data:
